<!DOCTYPE html>
<html>
<head>

    <title>AI Resume Ranking System</title>

    <style>

        body{

            font-family:Arial;

            background:#f4f4f4;

            margin:40px;

        }

        .container{

            width:700px;

            margin:auto;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0px 0px 10px gray;

        }

        h1{

            text-align:center;

            color:#2c3e50;

        }

        textarea{

            width:100%;

            height:180px;

            margin-top:10px;

        }

        input[type=file]{

            margin-top:15px;

        }

        button{

            margin-top:20px;

            width:100%;

            padding:12px;

            background:#3498db;

            color:white;

            border:none;

            font-size:18px;

            cursor:pointer;

            border-radius:5px;

        }

        button:hover{

            background:#2980b9;

        }

    </style>

</head>

<body>

<div class="container">

<h1>AI Resume Ranking System</h1>

<form action="/rank" method="POST" enctype="multipart/form-data">

<label><b>Job Description</b></label>

<textarea name="job" placeholder="Paste Job Description Here..." required></textarea>

<br><br>

<label><b>Select Resume PDFs</b></label>

<input type="file" name="resume" multiple required>

<br>

<button type="submit">

Analyze & Rank Resumes

</button>

</form>

</div>

</body>

</html>
